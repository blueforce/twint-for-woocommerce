name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP-Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Syntaxprüfung aller PHP-Dateien
        run: |
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 -P4 php -l

  coding-standards:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Dev-Abhängigkeiten installieren
        run: composer install --no-interaction --no-progress

      - name: Coding Standards prüfen
        run: composer phpcs -- -q

  build:
    name: ZIP-Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installierbares ZIP bauen
        run: ./build.sh

      - name: ZIP als Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: blueforce-manual-payments-for-twint
          path: blueforce-manual-payments-for-twint.zip
          if-no-files-found: error
